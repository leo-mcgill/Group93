<!DOCTYPE html>
<html lang="en">
<html>
    <!--head of html doc which contains metadata, title and link to external
        css
    -->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Upload Data</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css_styles/common_styles.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css_styles/upload_styles.css') }}">
        
    </head>
    <body>
        <!--title and navbar used to navigate around the website-->
        <div class="website_title"><h1>Movie Tracker</h2></div>
            <nav class="navbar">
                <ul class="nav_links">
                    <li><a href="/">Introduction</a></li>
                    <li><a href="/uploadData">Upload Data</a></li>
                    <li><a href="visualiseData">Visualise Data</a></li>
                    <li><a href="shareData">Share Data</a></li>
                </ul>
            </nav>
        </div>
        <div class="body_container">
            <div class="centered_container">
                <div class="centered_div column_direction">
                    <div class="title_container">
                        <h1 class="title">Add a Movie</h1>
                    </div>
                    <div class="upload_container">
                        <form class="" method="POST">
                            <label for="movie_title"><h2 class="white_font">Movie Title:</h2></label>
                            <input class="input" type="text" name="movie_title" placeholder="Enter a movie title" required>
                            <label class="white_font" for="user_rating"><h2 class="white_font">Your Rating (0-10):</h2></label>
                            <input class="input" type="number" name="user_rating" min="0" max="10"
                                   step="0.1" placeholder="e.g., 8.5" required><br><br>
                            <button class="upload_submit" type="submit">Add Movie</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
